<script>
// Fix: When embedded in an iframe, ensure reveal animations fire properly.
// Listen for visibility signal from the parent frame.
window.addEventListener('message', function(e) {
  if (e.data === 'reveal-all') {
    document.querySelectorAll('.reveal').forEach(function(el) {
      el.classList.add('visible');
    });
  }
});

// Robust iframe-aware reveal: handle both visible-start and hidden-start cases
(function() {
  var maxChecks = 40;
  var checkCount = 0;
  function tryReveal() {
    var unrevealed = document.querySelectorAll('.reveal:not(.visible)');
    if (unrevealed.length > 0) {
      // Force IntersectionObserver triggers via scroll nudge
      window.scrollBy(0, 1);
      window.scrollBy(0, -1);
      // If still unrevealed after nudge, force visibility
      setTimeout(function() {
        document.querySelectorAll('.reveal:not(.visible)').forEach(function(el) {
          el.classList.add('visible');
        });
      }, 200);
    }
    checkCount++;
    if (checkCount < maxChecks && unrevealed.length > 0) {
      setTimeout(tryReveal, 500);
    }
  }
  // Start checking after React has time to mount and render
  setTimeout(tryReveal, 800);
  // Also try on load event
  window.addEventListener('load', function() {
    setTimeout(tryReveal, 300);
  });
})();
</script>

<script>
(function() {
  // Wait for React to mount
  function initBpSidebar() {
    var sidebar = document.getElementById('bpSidebar');
    var collapseBtn = document.getElementById('bpCollapseBtn');
    if (!sidebar || !collapseBtn) return;

    // Collapse toggle
    collapseBtn.addEventListener('click', function() {
      sidebar.classList.toggle('collapsed');
    });

    // Section IDs matching the React app
    var sections = ['hero','thesis','market','platforms','financials','model','roadmap','risk','benchmarks','business-plan','contact'];
    var navItems = document.querySelectorAll('#bpSidebarNav .bp-nav-item');

    // Click handler — scroll to section
    navItems.forEach(function(btn) {
      btn.addEventListener('click', function() {
        var sectionId = btn.getAttribute('data-section');
        var target = document.getElementById(sectionId);
        if (target) {
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        } else if (sectionId === 'hero') {
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        // Update active state
        navItems.forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
      });
    });

    // IntersectionObserver for auto-highlighting
    var observerOpts = { rootMargin: '-20% 0px -60% 0px', threshold: 0 };
    var observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          var id = entry.target.id;
          navItems.forEach(function(b) {
            b.classList.toggle('active', b.getAttribute('data-section') === id);
          });
        }
      });
    }, observerOpts);

    sections.forEach(function(id) {
      var el = document.getElementById(id);
      if (el) observer.observe(el);
    });
  }

  // Retry until React mounts the sections
  var attempts = 0;
  function tryInit() {
    var thesis = document.getElementById('thesis');
    if (thesis || attempts > 40) {
      initBpSidebar();
    } else {
      attempts++;
      setTimeout(tryInit, 250);
    }
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', tryInit);
  } else {
    setTimeout(tryInit, 500);
  }
})();
</script>
